<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Primary teal-blue gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(201,70%,36%)"/>
      <stop offset="100%" stop-color="hsl(201,70%,24%)"/>
    </linearGradient>
    <!-- Accent orange for the pulse line -->
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="hsl(17,73%,61%)"/>
      <stop offset="100%" stop-color="hsl(17,85%,55%)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Subtle medical cross watermark -->
  <rect x="26" y="12" width="12" height="40" rx="3" fill="white" opacity="0.06"/>
  <rect x="12" y="26" width="40" height="12" rx="3" fill="white" opacity="0.06"/>

  <!-- Heartbeat / analytics pulse line -->
  <polyline
    points="6,38 18,38 22,38 26,22 30,48 34,16 38,42 42,32 46,38 58,38"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Small rising bar chart in bottom-right corner -->
  <rect x="44" y="48" width="4" height="6" rx="1" fill="white" opacity="0.45"/>
  <rect x="50" y="44" width="4" height="10" rx="1" fill="white" opacity="0.55"/>
  <rect x="56" y="40" width="4" height="14" rx="1" fill="white" opacity="0.65"/>
</svg>
